<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ascii compositor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
  }
  #screen {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #000;
    overflow: hidden;
  }
  /* ASCII canvas (always present, shown/hidden via display) */
  #c-ascii {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }
  /* Passthrough canvas — shown when ascii is OFF */
  #c-passthrough {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
  }
  /* Message overlay */
  #msg-overlay {
    position: absolute; bottom: 10px; left: 12px;
    font-size: 11px; color: rgba(255,255,255,0.28);
    pointer-events: none;
    font-family: 'Courier New', monospace;
    z-index: 10;
    transition: opacity 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.ui-collapsed #msg-overlay { opacity: 0; }

  .ctrl { display:flex; align-items:center; gap:6px; white-space:nowrap; flex-shrink:0; }
  .ctrl label { font-size:9px; color:rgba(255,255,255,0.38); text-transform:uppercase; letter-spacing:.02em; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
  .ctrl span  { font-size:11px; color:rgba(255,255,255,0.85); min-width:24px; text-align:right; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; letter-spacing:-.01em; }
  .sep { width:1px; height:22px; background:rgba(255,255,255,0.1); flex-shrink:0; }

  input[type=range] { width:72px; height:3px; accent-color:rgba(255,255,255,0.7); cursor:pointer; flex-shrink:0; }
  input[type=text] {
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:-.01em;
    border:1px solid rgba(255,255,255,0.13); background:rgba(255,255,255,0.07);
    padding:5px 8px; border-radius:2px; width:128px; outline:none; color:#fff; flex-shrink:0;
  }
  input[type=text]:focus { border-color:rgba(255,255,255,0.4); }
  input[type=text]::placeholder { color:rgba(255,255,255,0.2); }

  button {
    background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.75);
    border:1px solid rgba(255,255,255,0.13);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:-.01em;
    padding:5px 10px; cursor:pointer; border-radius:2px; white-space:nowrap;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.18s cubic-bezier(0.34, 1.45, 0.64, 1);
    flex-shrink:0;
  }
  button:hover  { background:rgba(255,255,255,0.18); }
  button:active { background:rgba(255,255,255,0.32); }

  .tbtn {
    background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.35);
    border:1px solid rgba(255,255,255,0.09);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:-.01em;
    padding:4px 9px; cursor:pointer; border-radius:2px; transition:all .1s; flex-shrink:0;
  }
  .tbtn.on { background:rgba(255,255,255,0.18); color:#fff; border-color:rgba(255,255,255,0.25); }

  .dbtn {
    background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.38);
    border:1px solid rgba(255,255,255,0.09);
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-size:11px; letter-spacing:-.01em;
    padding:4px 8px; cursor:pointer; border-radius:2px; transition:all .1s; flex-shrink:0;
  }
  .dbtn.active { background:rgba(255,255,255,0.2); color:#fff; border-color:rgba(255,255,255,0.26); }

  #btn-pdf {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 11px;
  }

  /* ── Chrome fix: barra sobre el canvas (fullscreen ASCII sota) ── */
  #chrome {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }
  #chrome #bar-clip,
  #chrome #ui-handle { pointer-events: auto; }

  /* Retalla la barra cap avall sense deixar forat al flux (ASCII a pantalla completa sota) */
  #bar-clip {
    width: 100%;
    overflow: hidden;
    max-height: 200px;
    transition: max-height 0.42s cubic-bezier(0.32, 0.72, 0, 1);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  body.ui-collapsed #bar-clip {
    max-height: 0;
    pointer-events: none;
  }

  /* Zona inferior: obrir calaix amb el cursor (darrere el chrome, z-index més baix) */
  #bottom-open-zone {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 56px;
    z-index: 95;
    pointer-events: auto;
  }

  #ui-handle {
    width: 44px;
    height: 3px;
    margin: 0 0 4px;
    padding: 0;
    border: none;
    border-radius: 2px;
    background: rgba(255,255,255,0.42);
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 0 10px rgba(0,0,0,0.35);
    font-size: 0;
    line-height: 0;
    transition: transform 0.26s cubic-bezier(0.34, 1.35, 0.64, 1), opacity 0.26s ease, background 0.2s,
      visibility 0.26s ease, height 0.26s ease, margin 0.26s ease, width 0.26s ease, box-shadow 0.26s ease;
    overflow: hidden;
    transform-origin: center bottom;
  }
  /* Calaix obert: handle amagat amb animació petita */
  body:not(.ui-collapsed) #ui-handle {
    opacity: 0;
    transform: translateY(6px) scaleX(0.65) scaleY(0.5);
    pointer-events: none;
    visibility: hidden;
    height: 0;
    width: 0;
    margin: 0;
    box-shadow: none;
  }
  body.ui-collapsed.handle-idle-hidden #ui-handle {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    height: 0;
    width: 0;
    margin: 0;
    box-shadow: none;
    transform: none;
  }
  #ui-handle:hover {
    transform: scaleX(1.1);
    background: rgba(255,255,255,0.62);
  }
  #ui-handle:active { transform: scaleX(1.04) scaleY(0.88); }

  /* ── Single unified bar ── */
  #bar {
    flex-shrink: 0;
    min-height: 52px;
    background: rgba(8,8,8,0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 16px;
    overflow-x: auto;
    overflow-y: hidden;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  #bar::-webkit-scrollbar { height: 3px; }
  #bar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

  .tbtn:active, .dbtn:active { transform: scale(0.96); }

  .density-switch {
    display: flex;
    gap: 2px;
    padding: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .density-switch .dbtn {
    min-width: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.24s cubic-bezier(0.34, 1.55, 0.64, 1), background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.2s;
  }
  .density-switch .dbtn.active {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  }

  /* Fosc fons quan el panell mòbil està obert (sota el chrome) */
  #chrome-scrim {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 98;
    background: rgba(0,0,0,0.42);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.32s ease;
  }

  /* ═══ Mòbil / estret (≤768px): menú des del costat dret, columna + scroll ═══ */
  @media (max-width: 768px) {
    #chrome-scrim {
      display: block;
    }
    body:not(.ui-collapsed) #chrome-scrim {
      opacity: 1;
      pointer-events: auto;
    }

    #bottom-open-zone {
      left: auto;
      right: 0;
      top: 0;
      bottom: 0;
      width: 44px;
      height: auto;
    }

    #chrome {
      left: auto;
      right: 0;
      bottom: 0;
      top: 0;
      width: auto;
      height: 100%;
      max-height: 100dvh;
      flex-direction: row-reverse;
      align-items: stretch;
      justify-content: flex-end;
      padding-right: env(safe-area-inset-right, 0px);
    }

    #bar-clip {
      width: auto;
      height: 100%;
      max-height: none !important;
      justify-content: flex-start;
      max-width: min(88vw, 300px);
      transition: max-width 0.38s cubic-bezier(0.32, 0.72, 0, 1);
    }
    body.ui-collapsed #bar-clip {
      max-width: 0;
      max-height: none !important;
      pointer-events: none;
    }

    #bar {
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 12px;
      width: min(88vw, 300px);
      min-width: min(88vw, 300px);
      max-width: min(88vw, 300px);
      min-height: 0;
      flex: 1;
      height: 100%;
      max-height: 100dvh;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border-top: none;
      border-left: 1px solid rgba(255,255,255,0.1);
    }
    #bar::-webkit-scrollbar { width: 4px; }
    #bar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    #bar > .sep {
      display: none;
    }

    #bar .ctrl {
      flex-wrap: wrap;
      white-space: normal;
      width: 100%;
      align-items: center;
      gap: 8px;
    }
    #bar .ctrl label {
      flex: 0 0 100%;
      margin-bottom: 2px;
    }
    #bar input[type=text] {
      width: 100%;
      min-width: 0;
      flex: 1 1 100%;
      max-width: 100%;
      padding: 10px 10px;
      font-size: 16px;
    }
    #bar input[type=range] {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      max-width: 100%;
      height: 28px;
    }
    #bar button,
    #bar .tbtn,
    #bar .dbtn {
      min-height: 44px;
      padding: 10px 14px;
      font-size: 13px;
    }
    #bar .density-switch .dbtn {
      min-height: 44px;
      min-width: 44px;
    }

    #ctrl-compositor,
    #ctrl-media {
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 14px !important;
      width: 100%;
    }
    #ctrl-compositor .sep,
    #ctrl-media .sep {
      display: none;
    }

    #btn-pdf {
      margin-left: 0;
      max-width: none;
      width: 100%;
      text-align: left;
      order: 99;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 10px;
    }

    #ui-handle {
      width: 4px;
      height: 52px;
      margin: 0 4px 0 0;
      align-self: center;
      border-radius: 2px;
      transform-origin: center right;
    }
    #ui-handle:hover {
      transform: scaleY(1.08);
      background: rgba(255,255,255,0.55);
    }
    #ui-handle:active {
      transform: scaleY(1.02) scaleX(0.9);
    }
    body:not(.ui-collapsed) #ui-handle {
      transform: translateX(8px) scaleY(0.55) scaleX(0.4);
      transform-origin: center right;
    }
    body.ui-collapsed.handle-idle-hidden #ui-handle {
      transform: none;
    }

    #msg-overlay {
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      left: max(12px, env(safe-area-inset-left, 0px));
      right: 56px;
      max-width: calc(100vw - 72px);
    }
  }
</style>
</head>
<body>

<div id="screen">
  <canvas id="c-ascii"></canvas>
  <canvas id="c-passthrough"></canvas>
  <div id="msg-overlay">// inicialitzant...</div>
</div>

<div id="chrome-scrim" aria-hidden="true"></div>
<div id="bottom-open-zone" aria-hidden="true"></div>

<div id="chrome">
<button type="button" id="ui-handle" aria-expanded="true" aria-controls="bar" title="Obre/tanca el calaix · clic fora (amb marge) el tanca"></button>
<div id="bar-clip">
<div id="bar">
  <!-- Mode toggle -->
  <div class="ctrl">
    <label>mode</label>
    <button class="tbtn on" id="btn-mode-toggle">compositor</button>
  </div>

  <div class="sep"></div>

  <!-- ASCII + Freeze (globals, sempre visibles) -->
  <div class="ctrl">
    <label>ascii</label>
    <button class="tbtn on" id="btn-ascii">on</button>
  </div>
  <div class="ctrl">
    <label>freeze</label>
    <button class="tbtn" id="btn-freeze">❄</button>
  </div>

  <div class="sep"></div>

  <!-- Controls mode compositor -->
  <div id="ctrl-compositor" style="display:flex;align-items:center;gap:14px;">
    <div class="ctrl">
      <label>fons</label>
      <input type="text" id="bg-query" value="nature landscape" placeholder="fons...">
      <button id="btn-bg-search">buscar</button>
      <button id="btn-bg-next">&#x27F3;</button>
      <button class="tbtn" id="btn-bg-lock" title="bloquejar canvi automàtic">&#x1F512;</button>
    </div>
    <div class="sep"></div>
    <div class="ctrl">
      <label>capes</label>
      <input type="text" id="ov-query" value="animal" placeholder="capes...">
      <button id="btn-ov-search">buscar</button>
      <label style="font-size:9px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:.02em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">capes #</label>
      <input type="range" id="sl-layers" min="0" max="6" value="3" step="1">
      <span id="v-layers">3</span>
      <label style="font-size:9px;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:.02em;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">suavitat</label>
      <input type="range" id="sl-feather" min="0" max="5" value="2.5" step="0.1">
      <span id="v-feather">2.5</span>
    </div>
  </div>

  <!-- Controls mode media -->
  <div id="ctrl-media" style="display:none;align-items:center;gap:14px;">
    <div class="ctrl">
      <label>tipus</label>
      <div class="density-switch" role="group" aria-label="tipus de mitjà">
        <button type="button" class="dbtn active" data-mtype="video">vídeo</button>
        <button type="button" class="dbtn" data-mtype="photo">foto</button>
      </div>
    </div>
    <div class="sep"></div>
    <div class="ctrl" id="ctrl-m-video">
      <input type="text" id="m-vid-query" value="nature landscape" placeholder="cerca vídeo...">
      <button id="btn-m-vid-search">buscar</button>
      <button id="btn-m-vid-next">&#x27F3;</button>
    </div>
    <div class="ctrl" id="ctrl-m-photo" style="display:none">
      <input type="text" id="m-img-query" value="nature landscape" placeholder="cerca foto...">
      <button id="btn-m-img-search">buscar</button>
      <button id="btn-m-img-next">&#x27F3;</button>
    </div>
  </div>

  <div class="sep"></div>

  <!-- Settings globals -->
  <div class="ctrl">
    <label>llum</label>
    <input type="range" id="sl-bright" min="0.2" max="3.0" value="1.0" step="0.05">
    <span id="v-bright">1.0</span>
  </div>
  <div class="ctrl">
    <label>sat</label>
    <input type="range" id="sl-sat" min="0" max="1.0" value="0.3" step="0.05">
    <span id="v-sat">0.3</span>
  </div>
  <div class="ctrl">
    <label>car.</label>
    <div class="density-switch" role="group" aria-label="densitat de caràcters">
      <button type="button" class="dbtn" data-d="0" title="densitat lleugera (+)">+</button>
      <button type="button" class="dbtn active" data-d="1" title="mitjana (detall)">a</button>
      <button type="button" class="dbtn" data-d="2" title="blocs (□)">□</button>
    </div>
  </div>
  <button type="button" class="tbtn" id="btn-pdf" title="Descarrega el frame actual en PDF (3 pàgines)">pdf</button>
</div>
</div>
</div>

<!-- Hidden media elements -->
<video id="bg-vid" style="display:none" crossorigin="anonymous" loop muted playsinline preload="auto"></video>
<canvas id="c-bg" style="display:none"></canvas>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const UNSPLASH_KEY = 'yRPScUFRTKQQK6JEPfdqwQPlhq_UsliMq_irBvOvZn8';
const PEXELS_KEY   = 'pVWoWsM41HMTnR0mvV54bPwm7rxzgKVCNOBWYh5nikesx3gWHYjPb3vy';
const TAGS = ['landscape','mountain','forest','city','nature','ocean','desert','river','skyline','fog','flowers','fire'];

const CHARS_LIGHT  = [' ', ' ', ' ', '.', '·', "'", ',', ':', ';', '!', 'i', 'l', '+', '*', 'e', '$', '@', '8', '#'];
const CHARS_COLOR  = [' ', '.', "'", '`', '^', '"', ',', ':', ';', 'I', 'l', '!', 'i', '>', '<', '~', '+', '?', ']', '[', '}', '{', '1', '|', '/', 't', 'f', 'j', 'r', 'x', 'n', 'u', 'v', 'c', 'z', 'X', 'Y', 'U', 'J', 'C', 'L', 'Q', '0', 'O', 'Z', '#', 'M', 'W', '&', '8', '%', 'B', '@', '$'];
const CHARS_FILLED = ['░', '░', '▒', '▒', '▓', '▓', '█'];
const DENSITY_MAP  = [CHARS_LIGHT, CHARS_COLOR, CHARS_FILLED];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let params = {
  ascii: true,
  frozen: false,
  fps: 12, layerCount: 3,
  feather: 2.5,
  brightness: 1.0, satBoost: 0.3,
  density: 1,
  sourceMode: 'video',  // 'video' | 'image'
};

let bgVideoList = [], bgIdx = 0;
let bgImageList = [], bgImgIdx = 0;
let bgImage = null;          // Image element actiu en mode imatge
let bgImgAutoTimer = null;
let overlayAssets = [];
let layers = [];
let cols, rows;
let charW, charH;          // actual pixel size of one character cell
let rafId = null, lastT = 0;
let currentMsg = '// inicialitzant...';

const bgVid       = document.getElementById('bg-vid');
const cBg         = document.getElementById('c-bg');
const ctxBg       = cBg.getContext('2d', { willReadFrequently: true });
const cAscii      = document.getElementById('c-ascii');
const ctxAscii    = cAscii.getContext('2d');
const cPass       = document.getElementById('c-passthrough');
const ctxPass     = cPass.getContext('2d');
const screenEl    = document.getElementById('screen');
const msgOverlay  = document.getElementById('msg-overlay');
const btnPdf      = document.getElementById('btn-pdf');

// Guardem l'últim frame compositat (cols×rows RGBA) per exportar-lo a PDF.
let lastComp = null;

// ═══════════════════════════════════════════
// GRID — auto-resolution from window size
// ═══════════════════════════════════════════
function measureChar() {
  const t = document.createElement('span');
  t.style.cssText = 'position:absolute;visibility:hidden;font-family:"Courier New",Courier,monospace;font-weight:bold;font-size:10px;white-space:pre;';
  t.textContent = 'MM';
  document.body.appendChild(t);
  const r = t.getBoundingClientRect();
  document.body.removeChild(t);
  return { w: r.width / 2, h: r.height };
}

function computeGrid() {
  const { w: cw, h: ch } = measureChar();
  charW = cw * 2; // each char is rendered doubled (two identical chars side by side)
  charH = ch;
  cols = Math.floor(screenEl.clientWidth / charW);
  rows = Math.floor(screenEl.clientHeight / charH);

  // Resize the background sampling canvas (low-res = one pixel per grid cell)
  cBg.width = cols; cBg.height = rows;

  // Resize the ASCII canvas to fill the screen at the computed font size
  cAscii.width  = cols * charW;
  cAscii.height = rows * charH;
  cAscii.style.width  = '100%';
  cAscii.style.height = '100%';

  // Resize the passthrough canvas to match screen
  cPass.width  = screenEl.clientWidth;
  cPass.height = screenEl.clientHeight;

  // Pre-configure ASCII canvas font (set once, reused every frame)
  ctxAscii.font = `bold ${charH}px "Courier New", Courier, monospace`;
  ctxAscii.textBaseline = 'top';
}

window.addEventListener('resize', () => { computeGrid(); buildLayers(); });
computeGrid();

// ═══════════════════════════════════════════
// COLOR UTILS
// ═══════════════════════════════════════════
function rgbToHsv(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=max===0?0:d/max, v=max;
  if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;if(h<0)h+=1;}
  return [h,s,v];
}
function hsvToRgb(h,s,v) {
  const i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t_=v*(1-(1-f)*s);
  const c=[[v,t_,p],[q,v,p],[p,v,t_],[p,q,v],[t_,p,v],[v,p,q]][i%6];
  return [c[0]*255, c[1]*255, c[2]*255];
}
function applyBrightSat(r,g,b) {
  r=Math.min(255,r*params.brightness); g=Math.min(255,g*params.brightness); b=Math.min(255,b*params.brightness);
  let [h,s,v]=rgbToHsv(r,g,b);
  // Només augmentar saturació si el píxel ja té color propi.
  // Si s≈0 (gris/blanc/negre), no toquem h ni s per evitar que h=0 (vermell) contamini.
  if (s > 0.05) s = Math.min(s + params.satBoost, 1.0);
  return hsvToRgb(h,s,v);
}
function rgbToBright(r,g,b) { return 0.267*r + 0.642*g + 0.091*b; }
function brightToChar(bright) {
  const chars = DENSITY_MAP[params.density];
  const idx = Math.floor((chars.length - 1) * bright / 255);
  return chars[Math.max(0, Math.min(idx, chars.length - 1))];
}

// ═══════════════════════════════════════════
// VIGNETTE MASK
// ═══════════════════════════════════════════
function buildVignetteMask(w, h, exponent) {
  const mask = new Float32Array(w * h);
  // exponent = 0 → sense vinyeta, tota la capa completament opaca
  if (exponent === 0) { mask.fill(1.0); return mask; }
  // Inner zone radius: pixels within this fraction of the edge are fully opaque
  const innerR = 0.55; // 55% del radi = zona opaca plana
  for (let y = 0; y < h; y++) {
    const dy = (y - (h-1) * 0.5) / ((h-1) * 0.5);
    for (let x = 0; x < w; x++) {
      const dx = (x - (w-1) * 0.5) / ((w-1) * 0.5);
      const d = Math.min(1.0, Math.sqrt(dx*dx + dy*dy));
      if (d <= innerR) {
        mask[y * w + x] = 1.0;
      } else {
        const t = (d - innerR) / (1.0 - innerR);
        const s = 1.0 - t;
        const smooth = s * s * (3 - 2*s);
        mask[y * w + x] = Math.pow(smooth, exponent);
      }
    }
  }
  return mask;
}

// Analitza la lluminositat mitjana d'una capa un cop carregada.
// Retorna 'multiply' si fons clar, 'screen' si fons fosc, 'normal' si mixt.
function detectBlendMode(ctx, w, h) {
  // Mostreig ràpid: 10×10 píxels uniformement distribuïts
  const sampleStep = Math.max(1, Math.floor(Math.min(w, h) / 10));
  let sumBright = 0, count = 0;
  // Necessitem llegir píxels — la capa ja té el primer frame dibuixat
  let data;
  try { data = ctx.getImageData(0, 0, w, h).data; } catch(e) { return 'normal'; }
  for (let y = 0; y < h; y += sampleStep) {
    for (let x = 0; x < w; x += sampleStep) {
      const i = (y * w + x) * 4;
      sumBright += 0.267 * data[i] + 0.642 * data[i+1] + 0.091 * data[i+2];
      count++;
    }
  }
  const avg = count > 0 ? sumBright / count : 128;
  if (avg > 180) return 'multiply';   // fons majoritàriament blanc
  if (avg < 75)  return 'screen';     // fons majoritàriament negre
  return 'normal';                    // mixt → vinyeta normal
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function rnd(a,b) { return a + Math.random()*(b-a); }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ═══════════════════════════════════════════
// LAYER FACTORY
// ═══════════════════════════════════════════
function makeLayer(asset) {
  const wFrac = rnd(0.25, 0.80);
  const hFrac = rnd(0.25, 0.75);
  const lw = Math.max(8,  Math.round(cols * wFrac));
  const lh = Math.max(4,  Math.round(rows * hFrac));
  const x = Math.round(rnd(-lw * 0.1, cols - lw * 0.85));
  const y = Math.round(rnd(-lh * 0.1, rows - lh * 0.85));
  const alpha = rnd(0.92, 1.0);
  const vigMask = buildVignetteMask(lw, lh, params.feather);

  const cv = document.createElement('canvas');
  cv.width = lw; cv.height = lh;
  const cx = cv.getContext('2d', { willReadFrequently: true });

  let media;
  if (asset.type === 'video') {
    media = document.createElement('video');
    media.src = asset.url; media.autoplay = true; media.loop = true;
    media.muted = true; media.playsInline = true; media.crossOrigin = 'anonymous';
    media.style.display = 'none';
    document.body.appendChild(media);
    media.play().catch(() => {});
  } else {
    media = new Image();
    media.crossOrigin = 'anonymous';
    media.src = asset.url;
  }

  return {
    asset, media, alpha,
    x, y, lw, lh,
    canvas: cv, ctx: cx,
    vigMask,
    blendMode: null,   // detectat al primer frame: 'multiply' | 'screen' | 'normal'
    startedAt: performance.now(),
    duration: rnd(5000, 20000),
  };
}

function destroyLayer(L) {
  if (L.asset.type === 'video' && L.media.parentNode)
    L.media.parentNode.removeChild(L.media);
}

function buildLayers() {
  layers.forEach(destroyLayer);
  layers = [];
  if (!overlayAssets.length) return;
  const shuffled = [...overlayAssets].sort(() => Math.random() - 0.5);
  for (let i = 0; i < params.layerCount; i++)
    layers.push(makeLayer(shuffled[i % shuffled.length]));
}

// ═══════════════════════════════════════════
// COMPOSITE — shared logic, returns pixel buffer
// ═══════════════════════════════════════════
function buildComposite(ts) {
  ctxBg.drawImage(bgVid, 0, 0, cols, rows);
  const bgPx = ctxBg.getImageData(0, 0, cols, rows).data;
  const comp  = new Uint8ClampedArray(bgPx);

  // Cycle expired layers
  for (let i = 0; i < layers.length; i++) {
    const L = layers[i];
    if (ts - L.startedAt > L.duration && overlayAssets.length > 0) {
      destroyLayer(L);
      layers[i] = makeLayer(pick(overlayAssets));
    }
  }

  // Alpha-composite each overlay layer
  for (const L of layers) {
    const m = L.media;
    const ready = L.asset.type === 'video'
      ? (m.readyState >= 2 && m.videoWidth > 0)
      : (m.complete && m.naturalWidth > 0);
    if (!ready) continue;

    try { L.ctx.drawImage(m, 0, 0, L.lw, L.lh); } catch(e) { continue; }

    // Detecció lazy del blend mode al primer frame disponible
    if (L.blendMode === null) L.blendMode = detectBlendMode(L.ctx, L.lw, L.lh);

    const lpx = L.ctx.getImageData(0, 0, L.lw, L.lh).data;
    const mode = L.blendMode;

    for (let ly = 0; ly < L.lh; ly++) {
      const gy = L.y + ly;
      if (gy < 0 || gy >= rows) continue;
      for (let lx = 0; lx < L.lw; lx++) {
        const gx = L.x + lx;
        if (gx < 0 || gx >= cols) continue;

        const gi = (gy * cols + gx) * 4;
        const li = (ly * L.lw + lx) * 4;

        const sr = comp[gi], sg = comp[gi+1], sb = comp[gi+2]; // src (fons)
        const lr = lpx[li],  lg = lpx[li+1],  lb = lpx[li+2];  // layer

        if (mode === 'multiply') {
          // Multiply: src * layer/255. La màscara de vinyeta controla el blend amb el fons
          const vig = L.vigMask[ly * L.lw + lx];
          const mr = (sr * lr / 255);
          const mg = (sg * lg / 255);
          const mb = (sb * lb / 255);
          // Interpola entre fons original i resultat multiply segons vinyeta
          comp[gi]   = sr * (1 - vig) + mr * vig;
          comp[gi+1] = sg * (1 - vig) + mg * vig;
          comp[gi+2] = sb * (1 - vig) + mb * vig;

        } else if (mode === 'screen') {
          // Screen: 255 - (255-src)*(255-layer)/255
          const vig = L.vigMask[ly * L.lw + lx];
          const mr = 255 - (255 - sr) * (255 - lr) / 255;
          const mg = 255 - (255 - sg) * (255 - lg) / 255;
          const mb = 255 - (255 - sb) * (255 - lb) / 255;
          comp[gi]   = sr * (1 - vig) + mr * vig;
          comp[gi+1] = sg * (1 - vig) + mg * vig;
          comp[gi+2] = sb * (1 - vig) + mb * vig;

        } else {
          // Normal: alpha blend amb vinyeta
          const a = L.alpha * L.vigMask[ly * L.lw + lx];
          if (a < 0.003) continue;
          comp[gi]   = sr * (1 - a) + lr * a;
          comp[gi+1] = sg * (1 - a) + lg * a;
          comp[gi+2] = sb * (1 - a) + lb * a;
        }
      }
    }
  }

  return comp;
}

// ═══════════════════════════════════════════
// ASCII RENDER — canvas-based (no DOM spans)
// ═══════════════════════════════════════════
function renderAscii(comp) {
  ctxAscii.fillStyle = '#000';
  ctxAscii.fillRect(0, 0, cAscii.width, cAscii.height);

  // Re-apply font after clear (some browsers reset it)
  ctxAscii.font = `bold ${charH}px "Courier New", Courier, monospace`;
  ctxAscii.textBaseline = 'top';

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const i = (row * cols + col) * 4;
      const r = comp[i], g = comp[i+1], b = comp[i+2];
      const bright = rgbToBright(r, g, b);
      const ch = brightToChar(bright);

      // Skip space chars entirely (background already filled)
      if (ch === ' ') continue;

      const [sr, sg, sb] = applyBrightSat(r, g, b);

      ctxAscii.fillStyle = `rgb(${sr|0},${sg|0},${sb|0})`;
      // Draw character doubled (two chars wide)
      ctxAscii.fillText(ch + ch, col * charW, row * charH);
    }
  }
}

// ═══════════════════════════════════════════
// PASSTHROUGH RENDER — raw composite pixels
// ═══════════════════════════════════════════
function renderPassthrough(comp) {
  // Upscale the low-res composite buffer to screen size
  // Step 1: put pixels on bg canvas (already cols×rows)
  const imgData = new ImageData(cols, rows);
  imgData.data.set(comp);
  // Re-draw to bgCanvas so we can use drawImage for upscale
  ctxBg.putImageData(imgData, 0, 0);
  // Step 2: stretch to full screen on passthrough canvas (smooth interpolation)
  ctxPass.imageSmoothingEnabled = true;
  ctxPass.imageSmoothingQuality = 'medium';
  ctxPass.drawImage(cBg, 0, 0, cPass.width, cPass.height);
}

// ═══════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════
function renderFrame(ts) {
  rafId = requestAnimationFrame(renderFrame);
  if (params.frozen) return;
  if (ts - lastT < 1000 / params.fps) return;
  lastT = ts;

  if (params.appMode === 'media') {
    // Mode 2: només foto o vídeo, sense capes
    const isPhoto = params.mediaType === 'photo';
    if (isPhoto) {
      if (!mImg || !mImg.complete || !mImg.naturalWidth) return;
      ctxBg.drawImage(mImg, 0, 0, cols, rows);
    } else {
      if (bgVid.readyState < 2 || !bgVid.videoWidth) return;
      ctxBg.drawImage(bgVid, 0, 0, cols, rows);
    }
    const bgPx = ctxBg.getImageData(0, 0, cols, rows).data;
    const comp  = new Uint8ClampedArray(bgPx);
    lastComp = comp;
    if (params.ascii) renderAscii(comp);
    else renderPassthrough(comp);
    return;
  }

  // Mode 1: compositor (vídeo + capes)
  if (bgVid.readyState < 2 || !bgVid.videoWidth) return;
  const comp = buildComposite(ts);
  lastComp = comp;
  if (params.ascii) renderAscii(comp);
  else renderPassthrough(comp);
}

function drawAsciiVectorPage(pdf, comp, opts) {
  const bg = opts.bg;                 // '#000' | '#fff'
  const fg = opts.fg || null;         // null => per-char color
  const invert = !!opts.invert;       // invert brightness for white background page
  const colorize = !!opts.colorize;   // true => per-char color (applyBrightSat)

  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();

  // Background fill
  pdf.setFillColor(bg === '#fff' ? 255 : 0);
  pdf.rect(0, 0, pageW, pageH, 'F');

  // Font + size: keep it close to canvas pixel grid.
  pdf.setFont('courier', 'bold');
  pdf.setFontSize(charH);

  // jsPDF baseline isn't always 'top' across versions; offset Y a bit to align.
  const yBaseline = charH * 0.92;

  for (let row = 0; row < rows; row++) {
    const y = row * charH + yBaseline;
    for (let col = 0; col < cols; col++) {
      const i = (row * cols + col) * 4;
      const r = comp[i], g = comp[i + 1], b = comp[i + 2];

      const bright = rgbToBright(r, g, b);
      const mappedBright = invert ? (255 - bright) : bright;
      const ch = brightToChar(mappedBright);
      if (ch === ' ') continue;

      if (colorize) {
        const [sr, sg, sb] = applyBrightSat(r, g, b);
        pdf.setTextColor(sr | 0, sg | 0, sb | 0);
      } else if (fg) {
        if (fg === '#fff') pdf.setTextColor(255, 255, 255);
        else pdf.setTextColor(0, 0, 0);
      }

      const x = col * charW;
      pdf.text(ch + ch, x, y);
    }
  }
}

async function downloadPdfFrame() {
  try {
    if (!lastComp || !cols || !rows) {
      showMsg('// encara no hi ha cap frame per exportar');
      return;
    }
    if (!window.jspdf || !window.jspdf.jsPDF) {
      showMsg('// falta la llibreria PDF (jspdf)');
      return;
    }

    // Force landscape pages and keep a consistent page size.
    const w = cAscii.width;
    const h = cAscii.height;
    const pageW = Math.max(w, h);
    const pageH = Math.min(w, h);

    const pdf = new window.jspdf.jsPDF({
      unit: 'px',
      orientation: 'landscape',
      format: [pageW, pageH],
      compress: true,
    });

    // Page 1: black bg + colored glyphs (vector, selectable).
    drawAsciiVectorPage(pdf, lastComp, { bg: '#000', colorize: true });

    // Page 2: black bg + white glyphs.
    pdf.addPage([pageW, pageH], 'landscape');
    drawAsciiVectorPage(pdf, lastComp, { bg: '#000', fg: '#fff', colorize: false });

    // Page 3: white bg + black glyphs, with inverted brightness mapping.
    pdf.addPage([pageW, pageH], 'landscape');
    drawAsciiVectorPage(pdf, lastComp, { bg: '#fff', fg: '#000', invert: true, colorize: false });

    pdf.save('ascii-frame.pdf');
  } catch (e) {
    showMsg('// error PDF: ' + (e && e.message ? e.message : e));
  }
}

function bindSlider(id, valId, key, fmt, cb) {
  const el = document.getElementById(id), out = document.getElementById(valId);
  if (!el) return;
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    out.textContent = fmt ? fmt(el.value) : el.value;
    if (cb) cb();
  });
}

  document.getElementById('ctrl-compositor').style.display = params.appMode === 'compositor' ? 'flex' : 'none';
  document.getElementById('ctrl-media').style.display      = params.appMode === 'media'      ? 'flex' : 'none';
  if (params.appMode === 'media' && !mVidList.length && !mImgList.length) {
    fetchMediaVideo(document.getElementById('m-vid-query').value.trim());
  }
});

// Fons (mode compositor)
let bgLocked = false;
document.getElementById('btn-bg-search').addEventListener('click', () =>
  fetchBgVideos(document.getElementById('bg-query').value.trim()));
document.getElementById('bg-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchBgVideos(e.target.value.trim());
});
document.getElementById('btn-bg-next').addEventListener('click', () => {
  bgLocked = false; nextBgVideo(true);
});
document.getElementById('btn-bg-lock').addEventListener('click', () => {
  bgLocked = !bgLocked;
  document.getElementById('btn-bg-lock').classList.toggle('on', bgLocked);
  if (!bgLocked) scheduleNextBg();
});

// Capes (mode compositor)
document.getElementById('btn-ov-search').addEventListener('click', () =>
  fetchOverlayAssets(document.getElementById('ov-query').value.trim()));
document.getElementById('ov-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchOverlayAssets(e.target.value.trim());
});

// Caràcters (únics, data-d)
document.querySelectorAll('[data-d]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-d]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.density = parseInt(btn.dataset.d);
  });
});

// Mode media: tipus foto/vídeo
document.querySelectorAll('[data-mtype]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mtype]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.mediaType = btn.dataset.mtype;
    const isPhoto = params.mediaType === 'photo';
    document.getElementById('ctrl-m-video').style.display = isPhoto ? 'none' : '';
    document.getElementById('ctrl-m-photo').style.display = isPhoto ? '' : 'none';
    if (isPhoto && !mImgList.length) fetchMediaPhoto(document.getElementById('m-img-query').value.trim());
    else if (!isPhoto && !mVidList.length) fetchMediaVideo(document.getElementById('m-vid-query').value.trim());
  });
});

document.getElementById('btn-m-vid-search').addEventListener('click', () =>
  fetchMediaVideo(document.getElementById('m-vid-query').value.trim()));
document.getElementById('m-vid-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchMediaVideo(e.target.value.trim());
});
document.getElementById('btn-m-vid-next').addEventListener('click', nextMediaVideo);

document.getElementById('btn-m-img-search').addEventListener('click', () =>
  fetchMediaPhoto(document.getElementById('m-img-query').value.trim()));
document.getElementById('m-img-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchMediaPhoto(e.target.value.trim());
});
document.getElementById('btn-m-img-next').addEventListener('click', nextMediaPhoto);

// PDF export
if (btnPdf) {
  btnPdf.addEventListener('click', downloadPdfFrame);
}

// ═══════════════════════════════════════════
// CHROME — autohide + handle (salvapantalles)
// ═══════════════════════════════════════════
const chromeEl = document.getElementById('chrome');
const barClipEl = document.getElementById('bar-clip');
const barEl = document.getElementById('bar');
const uiHandleEl = document.getElementById('ui-handle');
const bottomOpenZone = document.getElementById('bottom-open-zone');
const IDLE_HIDE_MS = 10000;
const CHROME_OUTSIDE_SAFE_PX = 16;
const HANDLE_IDLE_HIDE_MS = 1000;
let chromeHideTimer = null;
let handleIdleTimer = null;

function focusInChrome() {
  const a = document.activeElement;
  return chromeEl && a && a !== document.body && chromeEl.contains(a);
}

function clearChromeHideTimer() {
  if (chromeHideTimer) {
    clearTimeout(chromeHideTimer);
    chromeHideTimer = null;
  }
}

function clearHandleIdleTimer() {
  if (handleIdleTimer) {
    clearTimeout(handleIdleTimer);
    handleIdleTimer = null;
  }
}

function syncHandleHiddenState() {
  const expanded = !document.body.classList.contains('ui-collapsed');
  const idleHidden = document.body.classList.contains('handle-idle-hidden');
  uiHandleEl.setAttribute('aria-hidden', (expanded || idleHidden) ? 'true' : 'false');
}

function pointInPaddedBarRect(clientX, clientY) {
  if (!barEl) return false;
  const r = barEl.getBoundingClientRect();
  const p = CHROME_OUTSIDE_SAFE_PX;
  return clientX >= r.left - p && clientX <= r.right + p &&
    clientY >= r.top - p && clientY <= r.bottom + p;
}

function openChromeFromBottomEdge() {
  if (!document.body.classList.contains('ui-collapsed')) return;
  setChromeCollapsed(false);
}

function scheduleHandleHideWhenCollapsed() {
  clearHandleIdleTimer();
  if (!document.body.classList.contains('ui-collapsed')) return;
  handleIdleTimer = setTimeout(() => {
    document.body.classList.add('handle-idle-hidden');
    syncHandleHiddenState();
    handleIdleTimer = null;
  }, HANDLE_IDLE_HIDE_MS);
}

function revealHandleWhenCollapsed() {
  document.body.classList.remove('handle-idle-hidden');
  syncHandleHiddenState();
  scheduleHandleHideWhenCollapsed();
}

function scheduleChromeHide() {
  clearChromeHideTimer();
  if (document.body.classList.contains('ui-collapsed')) return;
  if (focusInChrome()) return;
  chromeHideTimer = setTimeout(() => {
    document.body.classList.add('ui-collapsed');
    uiHandleEl.setAttribute('aria-expanded', 'false');
    if (barClipEl) barClipEl.inert = true;
    chromeHideTimer = null;
    scheduleHandleHideWhenCollapsed();
  }, IDLE_HIDE_MS);
}

function setChromeCollapsed(collapsed) {
  document.body.classList.toggle('ui-collapsed', collapsed);
  uiHandleEl.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
  if (barClipEl) barClipEl.inert = collapsed;
  if (collapsed) {
    clearChromeHideTimer();
    document.body.classList.remove('handle-idle-hidden');
    syncHandleHiddenState();
    scheduleHandleHideWhenCollapsed();
  } else {
    clearHandleIdleTimer();
    document.body.classList.remove('handle-idle-hidden');
    syncHandleHiddenState();
    scheduleChromeHide();
  }
}

uiHandleEl.addEventListener('click', (e) => {
  e.stopPropagation();
  setChromeCollapsed(!document.body.classList.contains('ui-collapsed'));
});

if (bottomOpenZone) {
  bottomOpenZone.addEventListener('pointerenter', openChromeFromBottomEdge);
  bottomOpenZone.addEventListener('pointermove', (e) => {
    if (e.buttons === 0 && document.body.classList.contains('ui-collapsed')) openChromeFromBottomEdge();
  }, { passive: true });
  bottomOpenZone.addEventListener('touchstart', () => {
    openChromeFromBottomEdge();
  }, { passive: true });
}

document.addEventListener('pointerdown', (e) => {
  if (document.body.classList.contains('ui-collapsed')) return;
  if (e.button !== 0 && e.button !== undefined) return;
  if (e.target.closest && e.target.closest('#bar')) return;
  if (pointInPaddedBarRect(e.clientX, e.clientY)) return;
  setChromeCollapsed(true);
}, true);

function onGlobalPointerActivity() {
  if (document.body.classList.contains('ui-collapsed')) {
    revealHandleWhenCollapsed();
    return;
  }
  scheduleChromeHide();
}

document.addEventListener('mousemove', onGlobalPointerActivity, { passive: true });
document.addEventListener('touchstart', onGlobalPointerActivity, { passive: true });

chromeEl.addEventListener('focusin', () => {
  clearChromeHideTimer();
  if (document.body.classList.contains('ui-collapsed')) {
    clearHandleIdleTimer();
    document.body.classList.remove('handle-idle-hidden');
    syncHandleHiddenState();
  }
});

chromeEl.addEventListener('focusout', () => {
  if (!document.body.classList.contains('ui-collapsed')) scheduleChromeHide();
  else scheduleHandleHideWhenCollapsed();
});

document.addEventListener('wheel', (e) => {
  if (document.body.classList.contains('ui-collapsed')) {
    revealHandleWhenCollapsed();
  } else if (chromeEl.contains(e.target)) {
    scheduleChromeHide();
  }
}, { passive: true });

syncHandleHiddenState();
scheduleChromeHide();

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(async function init() {
  params.appMode   = 'compositor';
  params.mediaType = 'video';
  rafId = requestAnimationFrame(renderFrame);
  await fetchBgVideos('nature landscape');
  await fetchOverlayAssets('animal');
})();
</script>
