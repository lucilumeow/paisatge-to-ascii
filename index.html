<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh;
    font-family: 'Courier New', Courier, monospace;
    display: flex; flex-direction: column;

  #screen {

    width: 100%; height: 100%;

  /* Passthrough canvas — shown when ascii is OFF */
  #c-passthrough {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
  }

    position: absolute; bottom: 10px; left: 12px;

  #bar {
    flex-shrink: 0; height: 52px;

  body.bg-white #bar { background:rgba(255,255,255,0.9); border-top:1px solid #ddd; }
  body.bg-white .ctrl label { color:rgba(0,0,0,0.4); }

  body.bg-white .sep { background:rgba(0,0,0,0.12); }

  body.bg-white button:hover { background:rgba(0,0,0,0.14); }
  body.bg-white .tbtn { background:rgba(0,0,0,0.05); color:rgba(0,0,0,0.38); border-color:rgba(0,0,0,0.09); }
  body.bg-white .tbtn.on { background:rgba(0,0,0,0.16); color:#000; border-color:rgba(0,0,0,0.22); }

<body>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const UNSPLASH_KEY = 'yRPScUFRTKQQK6JEPfdqwQPlhq_UsliMq_irBvOvZn8';
const PEXELS_KEY   = 'pVWoWsM41HMTnR0mvV54bPwm7rxzgKVCNOBWYh5nikesx3gWHYjPb3vy';
const TAGS = ['landscape','mountain','forest','city','nature','ocean','desert','river','skyline','fog','flowers','fire'];

const CHARS_LIGHT  = [' ', ' ', ' ', '.', '·', "'", ',', ':', ';', '!', 'i', 'l', '+', '*', 'e', '$', '@', '8', '#'];
const CHARS_COLOR  = [' ', '.', "'", '`', '^', '"', ',', ':', ';', 'I', 'l', '!', 'i', '>', '<', '~', '+', '?', ']', '[', '}', '{', '1', '|', '/', 't', 'f', 'j', 'r', 'x', 'n', 'u', 'v', 'c', 'z', 'X', 'Y', 'U', 'J', 'C', 'L', 'Q', '0', 'O', 'Z', '#', 'M', 'W', '&', '8', '%', 'B', '@', '$'];
const CHARS_FILLED = ['░', '░', '▒', '▒', '▓', '▓', '█'];
const DENSITY_MAP  = [CHARS_LIGHT, CHARS_COLOR, CHARS_FILLED];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let params = {
  ascii: true,
  fps: 12, layerCount: 3,
  feather: 2.5,
  brightness: 1.0, satBoost: 0.3,
  density: 1, whiteBg: false,
};

let bgVideoList = [], bgIdx = 0;
let overlayAssets = [];
let layers = [];
let cols, rows;
let charW, charH;          // actual pixel size of one character cell
let rafId = null, lastT = 0;
let currentMsg = '// inicialitzant...';

const bgVid       = document.getElementById('bg-vid');
const cBg         = document.getElementById('c-bg');
const ctxBg       = cBg.getContext('2d', { willReadFrequently: true });
const cAscii      = document.getElementById('c-ascii');
const ctxAscii    = cAscii.getContext('2d');
const cPass       = document.getElementById('c-passthrough');
const ctxPass     = cPass.getContext('2d');
const screenEl    = document.getElementById('screen');
const msgOverlay  = document.getElementById('msg-overlay');
const label       = document.getElementById('label-right');

// ═══════════════════════════════════════════
// GRID — auto-resolution from window size
// ═══════════════════════════════════════════
function measureChar() {
  const t = document.createElement('span');
  t.style.cssText = 'position:absolute;visibility:hidden;font-family:"Courier New",Courier,monospace;font-weight:bold;font-size:10px;white-space:pre;';
  t.textContent = 'MM';
  document.body.appendChild(t);
  const r = t.getBoundingClientRect();
  document.body.removeChild(t);
  return { w: r.width / 2, h: r.height };
}

function computeGrid() {
  const { w: cw, h: ch } = measureChar();
  charW = cw * 2; // each char is rendered doubled (two identical chars side by side)
  charH = ch;
  cols = Math.floor(screenEl.clientWidth / charW);
  rows = Math.floor(screenEl.clientHeight / charH);

  // Resize the background sampling canvas (low-res = one pixel per grid cell)
  cBg.width = cols; cBg.height = rows;

  // Resize the ASCII canvas to fill the screen at the computed font size
  cAscii.width  = cols * charW;
  cAscii.height = rows * charH;
  cAscii.style.width  = '100%';
  cAscii.style.height = '100%';

  // Resize the passthrough canvas to match screen
  cPass.width  = screenEl.clientWidth;
  cPass.height = screenEl.clientHeight;

  // Pre-configure ASCII canvas font (set once, reused every frame)
  ctxAscii.font = `bold ${charH}px "Courier New", Courier, monospace`;
  ctxAscii.textBaseline = 'top';
}

window.addEventListener('resize', () => { computeGrid(); buildLayers(); });
computeGrid();

// ═══════════════════════════════════════════
// COLOR UTILS
// ═══════════════════════════════════════════
function rgbToHsv(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=max===0?0:d/max, v=max;
  if(d){if(max===r)h=((g-b)/d)%6;else if(max===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;if(h<0)h+=1;}
  return [h,s,v];
}
function hsvToRgb(h,s,v) {
  const i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t_=v*(1-(1-f)*s);
  const c=[[v,t_,p],[q,v,p],[p,v,t_],[p,q,v],[t_,p,v],[v,p,q]][i%6];
  return [c[0]*255, c[1]*255, c[2]*255];
}
function applyBrightSat(r,g,b) {
  r=Math.min(255,r*params.brightness); g=Math.min(255,g*params.brightness); b=Math.min(255,b*params.brightness);
  let [h,s,v]=rgbToHsv(r,g,b); s=Math.min(s+params.satBoost,1.0);
  return hsvToRgb(h,s,v);
}
function rgbToBright(r,g,b) { return 0.267*r + 0.642*g + 0.091*b; }
function brightToChar(bright) {
  const chars = DENSITY_MAP[params.density];
  const mapped = params.whiteBg ? (255 - bright) : bright;
  const idx = Math.floor((chars.length-1) * mapped / 255);
  return chars[Math.max(0, Math.min(idx, chars.length-1))];
}

// ═══════════════════════════════════════════
// VIGNETTE MASK
// ═══════════════════════════════════════════
function buildVignetteMask(w, h, exponent) {
  const mask = new Float32Array(w * h);
  // Inner zone radius: pixels within this fraction of the edge are fully opaque
  const innerR = 0.55; // 55% del radi = zona opaca plana
  for (let y = 0; y < h; y++) {
    const dy = (y - (h-1) * 0.5) / ((h-1) * 0.5);
    for (let x = 0; x < w; x++) {
      const dx = (x - (w-1) * 0.5) / ((w-1) * 0.5);
      const d = Math.min(1.0, Math.sqrt(dx*dx + dy*dy));
      // Remap: [0..innerR] → opac, [innerR..1] → fade
      if (d <= innerR) {
        mask[y * w + x] = 1.0;
      } else {
        const t = (d - innerR) / (1.0 - innerR); // 0..1 a la zona de degradat
        const s = 1.0 - t;
        const smooth = s * s * (3 - 2*s);
        mask[y * w + x] = Math.pow(smooth, exponent);
      }
    }
  }
  return mask;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function rnd(a,b) { return a + Math.random()*(b-a); }
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ═══════════════════════════════════════════
// LAYER FACTORY
// ═══════════════════════════════════════════
function makeLayer(asset) {
  const wFrac = rnd(0.25, 0.80);
  const hFrac = rnd(0.25, 0.75);
  const lw = Math.max(8,  Math.round(cols * wFrac));
  const lh = Math.max(4,  Math.round(rows * hFrac));
  const x = Math.round(rnd(-lw * 0.1, cols - lw * 0.85));
  const y = Math.round(rnd(-lh * 0.1, rows - lh * 0.85));
  const alpha = rnd(0.92, 1.0);
  const vigMask = buildVignetteMask(lw, lh, params.feather);

  const cv = document.createElement('canvas');
  cv.width = lw; cv.height = lh;
  const cx = cv.getContext('2d', { willReadFrequently: true });

  let media;
  if (asset.type === 'video') {
    media = document.createElement('video');
    media.src = asset.url; media.autoplay = true; media.loop = true;
    media.muted = true; media.playsInline = true; media.crossOrigin = 'anonymous';
    media.style.display = 'none';
    document.body.appendChild(media);
    media.play().catch(() => {});
  } else {
    media = new Image();
    media.crossOrigin = 'anonymous';
    media.src = asset.url;
  }

  return {
    asset, media, alpha,
    x, y, lw, lh,
    canvas: cv, ctx: cx,
    vigMask,
    startedAt: performance.now(),
    duration: rnd(5000, 20000),
  };
}

function destroyLayer(L) {
  if (L.asset.type === 'video' && L.media.parentNode)
    L.media.parentNode.removeChild(L.media);
}

function buildLayers() {
  layers.forEach(destroyLayer);
  layers = [];
  if (!overlayAssets.length) return;
  const shuffled = [...overlayAssets].sort(() => Math.random() - 0.5);
  for (let i = 0; i < params.layerCount; i++)
    layers.push(makeLayer(shuffled[i % shuffled.length]));
}

// ═══════════════════════════════════════════
// COMPOSITE — shared logic, returns pixel buffer
// ═══════════════════════════════════════════
function buildComposite(ts) {
  ctxBg.drawImage(bgVid, 0, 0, cols, rows);
  const bgPx = ctxBg.getImageData(0, 0, cols, rows).data;
  const comp  = new Uint8ClampedArray(bgPx);

  // Cycle expired layers
  for (let i = 0; i < layers.length; i++) {
    const L = layers[i];
    if (ts - L.startedAt > L.duration && overlayAssets.length > 0) {
      destroyLayer(L);
      layers[i] = makeLayer(pick(overlayAssets));
    }
  }

  // Alpha-composite each overlay layer
  for (const L of layers) {
    const m = L.media;
    const ready = L.asset.type === 'video'
      ? (m.readyState >= 2 && m.videoWidth > 0)
      : (m.complete && m.naturalWidth > 0);
    if (!ready) continue;

    try { L.ctx.drawImage(m, 0, 0, L.lw, L.lh); } catch(e) { continue; }
    const lpx = L.ctx.getImageData(0, 0, L.lw, L.lh).data;

    for (let ly = 0; ly < L.lh; ly++) {
      const gy = L.y + ly;
      if (gy < 0 || gy >= rows) continue;
      for (let lx = 0; lx < L.lw; lx++) {
        const gx = L.x + lx;
        if (gx < 0 || gx >= cols) continue;

        const a = L.alpha * L.vigMask[ly * L.lw + lx];
        if (a < 0.003) continue;

        const gi = (gy * cols + gx) * 4;
        const li = (ly * L.lw + lx) * 4;

        comp[gi]   = comp[gi]   * (1 - a) + lpx[li]   * a;
        comp[gi+1] = comp[gi+1] * (1 - a) + lpx[li+1] * a;
        comp[gi+2] = comp[gi+2] * (1 - a) + lpx[li+2] * a;
      }
    }
  }

  return comp;
}

// ═══════════════════════════════════════════
// ASCII RENDER — canvas-based (no DOM spans)
// ═══════════════════════════════════════════
function renderAscii(comp) {
  const bgColor = params.whiteBg ? '#fff' : '#000';
  ctxAscii.fillStyle = bgColor;
  ctxAscii.fillRect(0, 0, cAscii.width, cAscii.height);

  // Re-apply font after clear (some browsers reset it)
  ctxAscii.font = `bold ${charH}px "Courier New", Courier, monospace`;
  ctxAscii.textBaseline = 'top';

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const i = (row * cols + col) * 4;
      const r = comp[i], g = comp[i+1], b = comp[i+2];
      const bright = rgbToBright(r, g, b);
      const ch = brightToChar(bright);

      // Skip space chars entirely (background already filled)
      if (ch === ' ') continue;

      let [sr, sg, sb] = applyBrightSat(r, g, b);
      if (params.whiteBg) {
        const f = 1 - (bright / 255) * 0.5;
        sr *= f; sg *= f; sb *= f;
      }

      ctxAscii.fillStyle = `rgb(${sr|0},${sg|0},${sb|0})`;
      // Draw character doubled (two chars wide)
      ctxAscii.fillText(ch + ch, col * charW, row * charH);
    }
  }
}

// ═══════════════════════════════════════════
// PASSTHROUGH RENDER — raw composite pixels
// ═══════════════════════════════════════════
function renderPassthrough(comp) {
  // Upscale the low-res composite buffer to screen size
  // Step 1: put pixels on bg canvas (already cols×rows)
  const imgData = new ImageData(cols, rows);
  imgData.data.set(comp);
  // Re-draw to bgCanvas so we can use drawImage for upscale
  ctxBg.putImageData(imgData, 0, 0);
  // Step 2: stretch to full screen on passthrough canvas (smooth interpolation)
  ctxPass.imageSmoothingEnabled = true;
  ctxPass.imageSmoothingQuality = 'medium';
  ctxPass.drawImage(cBg, 0, 0, cPass.width, cPass.height);
}

// ═══════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════
function renderFrame(ts) {
  rafId = requestAnimationFrame(renderFrame);
  if (ts - lastT < 1000 / params.fps) return;
  lastT = ts;
  if (bgVid.readyState < 2 || !bgVid.videoWidth) return;

  const comp = buildComposite(ts);

  if (params.ascii) {
    renderAscii(comp);
  } else {
    renderPassthrough(comp);
  }
}

// ═══════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════
function showMsg(t) {
  currentMsg = t;
  msgOverlay.textContent = t;
}

async function fetchBgVideos(query) {
  if (!query) query = pick(TAGS);
  showMsg('// carregant fons...');
  try {
    const res = await fetch(
      `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=20&orientation=landscape`,
      { headers: { Authorization: PEXELS_KEY } }
    );
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    bgVideoList = data.videos.map(v => {
      const hd = v.video_files.find(f => f.quality === 'hd') || v.video_files[0];
      return { url: hd.link, name: v.user.name };
    });
    showMsg('');
    if (bgVideoList.length) nextBgVideo();
    else showMsg('// sense videos de fons');
  } catch(e) { showMsg('// error: ' + e.message); }
}

let bgAutoTimer = null;

function nextBgVideo() {
  if (!bgVideoList.length) return;
  bgIdx = (bgIdx + 1) % bgVideoList.length;
  const it = bgVideoList[bgIdx];
  bgVid.src = it.url; bgVid.load(); bgVid.play().catch(() => {});
  label.textContent = it.name + ' · pexels';

  // Schedule next auto-change: 10–20s
  if (bgAutoTimer) clearTimeout(bgAutoTimer);
  bgAutoTimer = setTimeout(nextBgVideo, rnd(10000, 20000));
}
// No canviem per 'ended'; el timer ho gestiona

async function fetchOverlayAssets(query) {
  if (!query) query = pick(TAGS);
  showMsg('// carregant capes...');
  overlayAssets = [];
  await Promise.allSettled([
    (async () => {
      try {
        const res = await fetch(
          `https://api.unsplash.com/photos/random?query=${encodeURIComponent(query)}&count=20&orientation=landscape&client_id=${UNSPLASH_KEY}`
        );
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        overlayAssets.push(...data.map(p => ({ type: 'image', url: p.urls.regular })));
      } catch(e) { console.warn('Unsplash', e.message); }
    })(),
    (async () => {
      try {
        const res = await fetch(
          `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&per_page=15&orientation=landscape`,
          { headers: { Authorization: PEXELS_KEY } }
        );
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        overlayAssets.push(...data.videos.map(v => {
          const sd = v.video_files.find(f => f.quality === 'sd') || v.video_files[0];
          return { type: 'video', url: sd.link };
        }));
      } catch(e) { console.warn('Pexels overlay', e.message); }
    })(),
  ]);
  showMsg('');
  buildLayers();
}

function bindSlider(id, valId, key, fmt, cb) {
  const el = document.getElementById(id), out = document.getElementById(valId);
  el.addEventListener('input', () => {
    params[key] = parseFloat(el.value);
    out.textContent = fmt ? fmt(el.value) : el.value;
    if (cb) cb();
  });
}

bindSlider('sl-layers',  'v-layers',  'layerCount', v => v + '',        buildLayers);
bindSlider('sl-fps',     'v-fps',     'fps',        v => v + '');
bindSlider('sl-bright',  'v-bright',  'brightness', v => parseFloat(v).toFixed(1));
bindSlider('sl-sat',     'v-sat',     'satBoost',   v => parseFloat(v).toFixed(2));
bindSlider('sl-feather', 'v-feather', 'feather',    v => parseFloat(v).toFixed(1), buildLayers);

document.getElementById('btn-ascii').addEventListener('click', () => {
  params.ascii = !params.ascii;
  document.getElementById('btn-ascii').classList.toggle('on', params.ascii);

  if (params.ascii) {
    // Show ASCII canvas, hide passthrough
    cAscii.style.display = 'block';
    cPass.style.display  = 'none';
  } else {
    // Hide ASCII canvas, show passthrough (raw video+layers)
    cAscii.style.display = 'none';
    cPass.style.display  = 'block';
  }
});

document.getElementById('btn-bg-search').addEventListener('click', () =>
  fetchBgVideos(document.getElementById('bg-query').value.trim()));
document.getElementById('bg-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchBgVideos(e.target.value.trim());
});
document.getElementById('btn-bg-next').addEventListener('click', nextBgVideo);

document.getElementById('btn-ov-search').addEventListener('click', () =>
  fetchOverlayAssets(document.getElementById('ov-query').value.trim()));
document.getElementById('ov-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') fetchOverlayAssets(e.target.value.trim());
});

document.querySelectorAll('.dbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    params.density = parseInt(btn.dataset.d);
  });
});

document.getElementById('btn-bg').addEventListener('click', () => {
  params.whiteBg = !params.whiteBg;
  const bg = params.whiteBg ? '#fff' : '#000';
  screenEl.style.background = bg;
  document.body.style.background = bg;
  document.body.classList.toggle('bg-white', params.whiteBg);
  document.getElementById('btn-bg').textContent = params.whiteBg ? '◑ fons: blanc' : '◑ fons: negre';
});

  rafId = requestAnimationFrame(renderFrame);
